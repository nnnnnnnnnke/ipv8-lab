<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="IPv8 Lab">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1530"/>
      <stop offset="100%" stop-color="#0e2a52"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ee1ff"/>
      <stop offset="100%" stop-color="#8a5cff"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#5ee1ff"/>
      <stop offset="100%" stop-color="#1b5fb0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="44" ry="44" fill="url(#bg)"/>

  <!-- Outer node ring (8 nodes, suggesting packet flow) -->
  <g stroke="url(#ring)" stroke-width="2" fill="none" opacity="0.55">
    <circle cx="128" cy="128" r="96"/>
  </g>
  <g>
    <circle cx="128" cy="32"  r="5.5" fill="url(#node)"/>
    <circle cx="196" cy="60"  r="5.5" fill="url(#node)"/>
    <circle cx="224" cy="128" r="5.5" fill="url(#node)"/>
    <circle cx="196" cy="196" r="5.5" fill="url(#node)"/>
    <circle cx="128" cy="224" r="5.5" fill="url(#node)"/>
    <circle cx="60"  cy="196" r="5.5" fill="url(#node)"/>
    <circle cx="32"  cy="128" r="5.5" fill="url(#node)"/>
    <circle cx="60"  cy="60"  r="5.5" fill="url(#node)"/>
  </g>

  <!-- Lines linking nodes like routed paths -->
  <g stroke="url(#ring)" stroke-width="1.3" opacity="0.35" fill="none">
    <line x1="128" y1="32"  x2="224" y2="128"/>
    <line x1="224" y1="128" x2="128" y2="224"/>
    <line x1="128" y1="224" x2="32"  y2="128"/>
    <line x1="32"  y1="128" x2="128" y2="32"/>
    <line x1="60"  y1="60"  x2="196" y2="196"/>
    <line x1="196" y1="60"  x2="60"  y2="196"/>
  </g>

  <!-- Figure-8 that doubles as the numeral 8 -->
  <g filter="url(#glow)">
    <path d="M128 66
             C 88 66, 88 124, 128 124
             C 168 124, 168 66, 128 66 Z
             M128 132
             C 88 132, 88 196, 128 196
             C 168 196, 168 132, 128 132 Z"
          fill="none"
          stroke="url(#ring)"
          stroke-width="9"
          stroke-linejoin="round"/>
  </g>

  <!-- Tiny label "IPv" with the 8 implied by the shape above -->
  <text x="128" y="244" text-anchor="middle"
        font-family="SF Mono, Menlo, Consolas, monospace"
        font-size="14" font-weight="700"
        fill="#5ee1ff" letter-spacing="2">
    I P v 8
  </text>
</svg>
