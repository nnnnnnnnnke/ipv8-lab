!
! FRR configuration for the IPv8 interop test.
!
! Topology:
!        10.100.1.10  <--->  10.100.1.1 [eth1]   frr   [eth2] 10.100.2.1  <--->  10.100.2.10
!            hostA                                                                   hostB
!
! FRR simply routes between the two /24s.  No dynamic protocol needed —
! direct connected routes are sufficient.
!
hostname frr-ipv8-gw
password zebra
enable password zebra
!
ip forwarding
!
line vty
!
